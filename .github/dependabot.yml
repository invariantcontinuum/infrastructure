version: 2
updates:
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers: [peasantsai]
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels: [dependencies, docker]
    ignore:
      - dependency-name: "*"
        update-types: [version-update:semver-major]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers: [peasantsai]
    commit-message:
      prefix: "ci(deps)"
      include: scope
    labels: [dependencies, ci/cd]
